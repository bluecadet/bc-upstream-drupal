api_version: 1
web_docroot: true
# See https://pantheon.io/docs/pantheon-yml/#enforce-https--hsts for valid values.
enforce_https: transitional
php_version: 8.3
database:
  version: 10.6
# See https://docs.pantheon.io/guides/drush/drush-versions#drupal-9-10-and-beyond
# for valid values. 10 is the latest major version of Drush Pantheon supports.
drush_version: 10
build_step: true
protected_web_paths:
  - /private/
  - /sites/default/files/private/
  - /sites/default/files/config/
